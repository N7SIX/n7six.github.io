name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Lint JS
        run: npm run lint:js
      - name: Lint CSS
        run: npm run lint:css
      - name: Format check
        run: npm run format -- --check
      - name: Run basic JS tests
        run: |
          npm install --save-dev mocha
          npx mocha test/*.test.js
