name: HTML-Proofer

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  htmlproofer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install dependencies
        run: |
          gem install bundler
          bundle install
      - name: Build site
        run: bundle exec jekyll build --config _config.yml,_config.production.yml
      - name: Run HTMLProofer
        run: |
          gem install html-proofer
          npx -y serve _site &
          sleep 5
          htmlproofer ./_site --checks Links,Images,Scripts --allow-hash-href --disable-external
