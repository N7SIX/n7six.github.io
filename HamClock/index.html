<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HamClock Live</title>
  <style>
    body { font-family: Georgia, "Times New Roman", serif; margin: 0; padding: 2rem; background: #f6f3ea; color: #1d1b16; }
    .card { max-width: 980px; margin: 0 auto; background: #fffdfa; border: 1px solid #d9cfb7; border-radius: 12px; padding: 1rem; box-shadow: 0 10px 30px rgba(75,55,20,.08); }
    h1 { margin-top: 0; letter-spacing: .02em; }
    img { width: 100%; height: auto; border-radius: 8px; border: 1px solid #c9bda0; background: #ede3cf; }
    pre { background: #1f1c16; color: #eee3c8; padding: .75rem; border-radius: 8px; overflow: auto; }
    .muted { opacity: .8; }
  </style>
</head>
<body>
  <main class="card">
    <h1>HamClock Live</h1>
    <p class="muted">Set your HamClock API endpoint below (example: https://hamclock-api.yourdomain.com).</p>
    <p>
      <label for="api-base"><strong>API Base URL</strong></label><br/>
      <input id="api-base" type="url" placeholder="https://hamclock-api.example.com" style="width:100%;max-width:700px;padding:.55rem;border:1px solid #c9bda0;border-radius:8px;margin:.35rem 0;" />
      <button id="api-save" type="button" style="padding:.5rem .9rem;border-radius:8px;border:1px solid #7f755a;background:#f4eacc;color:#332d20;cursor:pointer;">Save</button>
      <span id="api-msg" class="muted" style="margin-left:.5rem;"></span>
    </p>
    <img id="hc-shot" alt="HamClock screenshot" />
    <h2>Status</h2>
    <pre id="hc-status">Loading...</pre>
  </main>

  <script>
    const DEFAULT_API_BASE = "https://hamclock-api.example.com";
    const apiInput = document.getElementById("api-base");
    const apiSave = document.getElementById("api-save");
    const apiMsg = document.getElementById("api-msg");
    const shot = document.getElementById("hc-shot");
    const status = document.getElementById("hc-status");

    function getApiBase() {
      const qp = new URLSearchParams(window.location.search).get("api");
      if (qp) return qp.replace(/\/$/, "");
      const saved = localStorage.getItem("hamclock_api_base");
      if (saved) return saved.replace(/\/$/, "");
      return DEFAULT_API_BASE;
    }

    function setApiBase(v) {
      localStorage.setItem("hamclock_api_base", v.replace(/\/$/, ""));
    }

    function refreshShot() {
      const base = getApiBase();
      shot.src = `${base}/get_capture.bmp?t=${Date.now()}`;
    }

    async function refreshStatus() {
      try {
        const base = getApiBase();
        const r = await fetch(`${base}/get_time.txt?t=${Date.now()}`, { cache: "no-store" });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        status.textContent = await r.text();
      } catch (err) {
        status.textContent = `API error: ${err.message}`;
      }
    }

    apiInput.value = getApiBase();
    apiSave.addEventListener("click", () => {
      const v = apiInput.value.trim();
      if (!/^https?:\/\//i.test(v)) {
        apiMsg.textContent = "Enter a valid http(s) URL";
        return;
      }
      setApiBase(v);
      apiMsg.textContent = "Saved";
      refreshShot();
      refreshStatus();
      setTimeout(() => { apiMsg.textContent = ""; }, 2000);
    });

    refreshShot();
    refreshStatus();
    setInterval(refreshShot, 10000);
    setInterval(refreshStatus, 15000);
  </script>
</body>
</html>
